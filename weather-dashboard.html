<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天氣儀表板 - Weather Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans CJK TC', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2847 100%);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease-in;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .api-setup {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      animation: slideDown 0.6s ease-out;
    }

    .api-input-group {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin-bottom: 15px;
    }

    .api-note {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .search-section {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      animation: slideDown 0.6s ease-out;
    }

    .search-input {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      animation: slideDown 0.4s ease-out;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .message.info {
      background: rgba(99, 102, 241, 0.1);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .main-weather {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 30px;
      animation: slideUp 0.6s ease-out;
      backdrop-filter: blur(10px);
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .weather-title {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .weather-icon {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .weather-info h2 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .weather-description {
      font-size: 1.3rem;
      color: var(--text-secondary);
      text-transform: capitalize;
      margin-bottom: 10px;
    }

    .weather-location {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .detail-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-4px);
      border-color: var(--primary);
    }

    .detail-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }

    .forecast-section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      animation: slideUp 0.6s ease-out 0.1s both;
    }

    .forecast-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .forecast-card:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary);
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.2);
    }

    .forecast-time {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .forecast-icon {
      font-size: 3rem;
      margin: 12px 0;
    }

    .forecast-temp {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .forecast-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: capitalize;
    }

    .hourly-scroll {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 20px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      scroll-behavior: smooth;
    }

    .hourly-card {
      flex: 0 0 120px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .hourly-card:hover {
      background: rgba(99, 102, 241, 0.2);
      transform: translateY(-4px);
    }

    .hourly-time {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .hourly-icon {
      font-size: 2rem;
      margin: 8px 0;
    }

    .hourly-temp {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .favorites {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .favorite-btn {
      padding: 10px 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: var(--primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .favorite-btn:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: var(--primary);
    }

    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .no-data-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2rem;
      }

      .search-section,
      .api-input-group {
        grid-template-columns: 1fr;
      }

      .weather-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .weather-icon {
        width: 80px;
        height: 80px;
        font-size: 50px;
      }

      .weather-info h2 {
        font-size: 2rem;
      }

      .main-weather {
        padding: 20px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .demo-info {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .demo-info a {
      color: var(--primary);
      text-decoration: none;
    }

    .demo-info a:hover {
      text-decoration: underline;
    }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌤️ 天氣儀表板</h1>
      <p>Weather Dashboard - 實時天氣預報</p>
    </header>

    <div class="demo-info">
      ℹ️ 需要 API 金鑰？訪問 <a href="https://openweathermap.org/api" target="_blank">OpenWeatherMap</a> 免費註冊並取得 API 金鑰。
      <br>
      💡 推薦使用 <a href="https://openweathermap.org/find" target="_blank">City ID</a> 或直接輸入城市名稱。
    </div>

    <!-- API 設定 -->
    <div class="api-setup">
      <h3>⚙️ API 設定</h3>
      <div class="api-input-group">
        <input 
          type="password" 
          id="apiKey" 
          placeholder="輸入你的 OpenWeatherMap API 金鑰"
          autocomplete="off"
        />
        <button class="btn-primary" id="saveApiBtn">💾 保存 API</button>
        <button class="btn-secondary" id="clearApiBtn">🗑️ 清除</button>
      </div>
      <div class="api-note">
        🔒 你的 API 金鑰只會保存在本地瀏覽器，不會發送到任何服務器。
      </div>
    </div>

    <!-- 搜索欄 -->
    <div class="search-section">
      <div class="search-input">
        <input 
          type="text" 
          id="searchCity" 
          placeholder="輸入城市名稱或 City ID..." 
          autocomplete="off"
        />
        <select id="unitToggle">
          <option value="metric">°C / m/s</option>
          <option value="imperial">°F / mph</option>
        </select>
      </div>
      <button class="btn-primary" id="searchBtn">
        <span id="searchIcon">🔍</span> 搜索
      </button>
      <button class="btn-secondary" id="geoBtn" title="使用我的位置">
        📍 我的位置
      </button>
    </div>

    <!-- 消息區域 -->
    <div id="messages"></div>

    <!-- 快速訪問城市 -->
    <div>
      <h3 style="margin-bottom: 15px;">⭐ 快速訪問</h3>
      <div class="favorites" id="favoriteCities"></div>
      <button class="btn-primary" id="addFavBtn" style="width: 100%; margin-bottom: 30px;">+ 加入到快速訪問</button>
    </div>

    <!-- 主要天氣部分 -->
    <div id="mainWeatherSection"></div>

    <!-- 每小時預報 -->
    <div id="hourlySection" class="forecast-section"></div>

    <!-- 5 天預報 -->
    <div id="forecastSection" class="forecast-section"></div>

    <!-- 無數據消息 -->
    <div id="noData" class="no-data">
      <div class="no-data-icon">🌍</div>
      <h2>歡迎使用天氣儀表板</h2>
      <p>請先配置 API 金鑰，然後搜索城市開始使用</p>
    </div>
  </div>

  <script>
    // 配置
    const CONFIG = {
      apiKey: localStorage.getItem('weatherApiKey') || '',
      baseUrl: 'https://api.openweathermap.org/data/2.5',
      geoUrl: 'https://api.openweathermap.org/geo/1.0',
      units: 'metric',
      defaultCities: ['Hong Kong', 'London', 'Tokyo', 'New York', 'Dubai', 'Singapore']
    };

    // 狀態
    let currentWeather = null;
    let currentForecast = null;
    let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

    // DOM 元素
    const elements = {
      apiKey: document.getElementById('apiKey'),
      saveApiBtn: document.getElementById('saveApiBtn'),
      clearApiBtn: document.getElementById('clearApiBtn'),
      searchCity: document.getElementById('searchCity'),
      searchBtn: document.getElementById('searchBtn'),
      geoBtn: document.getElementById('geoBtn'),
      unitToggle: document.getElementById('unitToggle'),
      messages: document.getElementById('messages'),
      mainWeatherSection: document.getElementById('mainWeatherSection'),
      hourlySection: document.getElementById('hourlySection'),
      forecastSection: document.getElementById('forecastSection'),
      noData: document.getElementById('noData'),
      favoriteCities: document.getElementById('favoriteCities'),
      addFavBtn: document.getElementById('addFavBtn'),
      searchIcon: document.getElementById('searchIcon')
    };

    // 顯示消息
    function showMessage(text, type = 'info') {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.textContent = text;
      elements.messages.innerHTML = '';
      elements.messages.appendChild(msgDiv);
      
      if (type !== 'error') {
        setTimeout(() => msgDiv.remove(), 5000);
      }
    }

    // 設置載入狀態
    function setLoading(loading) {
      if (loading) {
        elements.searchIcon.innerHTML = '<span class="loading-spinner"></span>';
        elements.searchBtn.disabled = true;
        elements.geoBtn.disabled = true;
      } else {
        elements.searchIcon.innerHTML = '🔍';
        elements.searchBtn.disabled = false;
        elements.geoBtn.disabled = false;
      }
    }

    // 保存 API 金鑰
    function saveApiKey() {
      const key = elements.apiKey.value.trim();
      if (!key) {
        showMessage('請輸入 API 金鑰', 'error');
        return;
      }
      CONFIG.apiKey = key;
      localStorage.setItem('weatherApiKey', key);
      elements.apiKey.value = key;
      showMessage('✓ API 金鑰已保存', 'success');
    }

    // 清除 API 金鑰
    function clearApiKey() {
      CONFIG.apiKey = '';
      localStorage.removeItem('weatherApiKey');
      elements.apiKey.value = '';
      localStorage.removeItem('weatherFavorites');
      favorites = [];
      currentWeather = null;
      currentForecast = null;
      elements.mainWeatherSection.innerHTML = '';
      elements.hourlySection.innerHTML = '';
      elements.forecastSection.innerHTML = '';
      elements.noData.style.display = 'block';
      renderFavorites();
      showMessage('✓ 已清除 API 金鑰和所有數據', 'success');
    }

    // 格式化時間
    function formatTime(timestamp, format = 'time') {
      const date = new Date(timestamp * 1000);
      if (format === 'time') {
        return date.toLocaleTimeString('zh-Hant-TW', { hour: '2-digit', minute: '2-digit' });
      }
      if (format === 'day') {
        return date.toLocaleDateString('zh-Hant-TW', { weekday: 'short', month: 'short', day: 'numeric' });
      }
      return date.toLocaleDateString('zh-Hant-TW');
    }

    // 獲取天氣圖標
    function getWeatherIcon(iconCode) {
      const iconMap = {
        '01d': '☀️', '01n': '🌙',
        '02d': '⛅', '02n': '🌥️',
        '03d': '☁️', '03n': '☁️',
        '04d': '☁️', '04n': '☁️',
        '09d': '🌧️', '09n': '🌧️',
        '10d': '🌦️', '10n': '🌧️',
        '11d': '⛈️', '11n': '⛈️',
        '13d': '❄️', '13n': '❄️',
        '50d': '🌫️', '50n': '🌫️'
      };
      return iconMap[iconCode] || '🌤️';
    }

    // 獲取風向
    function getWindDirection(degrees) {
      const directions = ['北', '北北東', '東北', '東北東', '東', '東南東', '東南', '南南東', '南', '南南西', '西南', '西南西', '西', '西北西', '西北', '北西北'];
      const index = Math.round(degrees / 22.5) % 16;
      return directions[index];
    }

    // 獲取天氣數據
    async function fetchWeatherByCity(cityName) {
      if (!CONFIG.apiKey) {
        showMessage('❌ 請先設定 API 金鑰', 'error');
        return null;
      }

      try {
        setLoading(true);
        showMessage('⏳ 載入中...', 'info');

        // 嘗試按 City ID 或城市名稱搜索
        const response = await fetch(
          `${CONFIG.baseUrl}/weather?q=${encodeURIComponent(cityName)}&units=${CONFIG.units}&appid=${CONFIG.apiKey}`
        );

        if (!response.ok) {
          throw new Error(response.status === 404 ? '找不到城市' : `API 錯誤: ${response.status}`);
        }

        currentWeather = await response.json();
        
        // 獲取預報數據
        const forecastRes = await fetch(
          `${CONFIG.baseUrl}/forecast?lat=${currentWeather.coord.lat}&lon=${currentWeather.coord.lon}&units=${CONFIG.units}&appid=${CONFIG.apiKey}`
        );

        if (forecastRes.ok) {
          currentForecast = await forecastRes.json();
        }

        displayWeather();
        showMessage(`✓ 已載入 ${currentWeather.name} 的天氣數據`, 'success');
        return currentWeather;
      } catch (error) {
        showMessage(`❌ ${error.message}`, 'error');
        return null;
      } finally {
        setLoading(false);
      }
    }

    // 顯示天氣
    function displayWeather() {
      if (!currentWeather) {
        elements.mainWeatherSection.innerHTML = '';
        elements.noData.style.display = 'block';
        return;
      }

      elements.noData.style.display = 'none';
      const units = CONFIG.units === 'metric' ? '°C' : '°F';
      const speedUnits = CONFIG.units === 'metric' ? 'm/s' : 'mph';

      const mainHTML = `
        <div class="main-weather">
          <div class="weather-header">
            <div class="weather-title">
              <div class="weather-icon">${getWeatherIcon(currentWeather.weather[0].icon)}</div>
              <div class="weather-info">
                <h2>${Math.round(currentWeather.main.temp)}${units}</h2>
                <div class="weather-description">${currentWeather.weather[0].main}</div>
                <div class="weather-location">
                  📍 ${currentWeather.name}, ${currentWeather.sys.country}
                </div>
                <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">
                  體感 ${Math.round(currentWeather.main.feels_like)}${units}
                </div>
              </div>
            </div>
          </div>

          <div class="weather-details">
            <div class="detail-card">
              <div class="detail-label">最高 / 最低</div>
              <div class="detail-value">${Math.round(currentWeather.main.temp_max)}${units} / ${Math.round(currentWeather.main.temp_min)}${units}</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">濕度</div>
              <div class="detail-value">${currentWeather.main.humidity}%</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">氣壓</div>
              <div class="detail-value">${currentWeather.main.pressure} hPa</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">風速</div>
              <div class="detail-value">${Math.round(currentWeather.wind.speed * 10) / 10} ${speedUnits}</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">風向</div>
              <div class="detail-value">${getWindDirection(currentWeather.wind.deg)}</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">能見度</div>
              <div class="detail-value">${Math.round(currentWeather.visibility / 1000)} km</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">雲量</div>
              <div class="detail-value">${currentWeather.clouds.all}%</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">日出</div>
              <div class="detail-value">${formatTime(currentWeather.sys.sunrise, 'time')}</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">日落</div>
              <div class="detail-value">${formatTime(currentWeather.sys.sunset, 'time')}</div>
            </div>
          </div>
        </div>
      `;

      elements.mainWeatherSection.innerHTML = mainHTML;

      if (currentForecast) {
        displayForecast();
        displayHourlyForecast();
      }
    }

    // 顯示每小時預報
    function displayHourlyForecast() {
      if (!currentForecast?.list) return;

      const units = CONFIG.units === 'metric' ? '°C' : '°F';
      const hourlyData = currentForecast.list.slice(0, 12);

      let hourlyHTML = `
        <h3 class="section-title">⏰ 每小時預報</h3>
        <div class="hourly-scroll">
      `;

      hourlyData.forEach(item => {
        hourlyHTML += `
          <div class="hourly-card">
            <div class="hourly-time">${formatTime(item.dt, 'time')}</div>
            <div class="hourly-icon">${getWeatherIcon(item.weather[0].icon)}</div>
            <div class="hourly-temp">${Math.round(item.main.temp)}${units}</div>
          </div>
        `;
      });

      hourlyHTML += '</div>';
      elements.hourlySection.innerHTML = hourlyHTML;
    }

    // 顯示 5 天預報
    function displayForecast() {
      if (!currentForecast?.list) return;

      const units = CONFIG.units === 'metric' ? '°C' : '°F';
      const forecastList = [];
      const seenDates = new Set();

      currentForecast.list.forEach(item => {
        const date = new Date(item.dt * 1000).toDateString();
        if (!seenDates.has(date) && forecastList.length < 5) {
          seenDates.add(date);
          forecastList.push(item);
        }
      });

      let forecastHTML = `
        <h3 class="section-title">📅 5 天預報</h3>
        <div class="forecast-grid">
      `;

      forecastList.forEach(item => {
        forecastHTML += `
          <div class="forecast-card">
            <div class="forecast-time">${formatTime(item.dt, 'day')}</div>
            <div class="forecast-icon">${getWeatherIcon(item.weather[0].icon)}</div>
            <div class="forecast-temp">${Math.round(item.main.temp_max)}${units} / ${Math.round(item.main.temp_min)}${units}</div>
            <div class="forecast-desc">${item.weather[0].main}</div>
          </div>
        `;
      });

      forecastHTML += '</div>';
      elements.forecastSection.innerHTML = forecastHTML;
    }

    // 加入快速訪問
    function addToFavorites() {
      if (!currentWeather) {
        showMessage('❌ 請先搜索城市', 'error');
        return;
      }

      const cityName = `${currentWeather.name}, ${currentWeather.sys.country}`;
      
      if (!favorites.includes(cityName)) {
        favorites.push(cityName);
        localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
        showMessage(`✓ 已加入 ${cityName} 到快速訪問`, 'success');
        renderFavorites();
      } else {
        showMessage(`${cityName} 已在快速訪問中`, 'error');
      }
    }

    // 渲染快速訪問
    function renderFavorites() {
      let html = '';

      CONFIG.defaultCities.forEach(city => {
        html += `
          <button class="favorite-btn" onclick="searchCity('${city}')">
            📍 ${city}
          </button>
        `;
      });

      favorites.forEach(city => {
        html += `
          <button class="favorite-btn" onclick="searchCity('${city}')">
            ⭐ ${city}
          </button>
        `;
      });

      elements.favoriteCities.innerHTML = html;
    }

    // 搜索城市
    async function searchCity(cityName) {
      if (!cityName) {
        showMessage('❌ 請輸入城市名稱', 'error');
        return;
      }
      elements.searchCity.value = cityName;
      await fetchWeatherByCity(cityName);
    }

    // 獲取地理位置
    function getGeolocation() {
      if (!navigator.geolocation) {
        showMessage('❌ 你的瀏覽器不支援地理位置', 'error');
        return;
      }

      if (!CONFIG.apiKey) {
        showMessage('❌ 請先設定 API 金鑰', 'error');
        return;
      }

      setLoading(true);
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          try {
            const { latitude, longitude } = position.coords;
            const response = await fetch(
              `${CONFIG.baseUrl}/weather?lat=${latitude}&lon=${longitude}&units=${CONFIG.units}&appid=${CONFIG.apiKey}`
            );

            if (!response.ok) throw new Error('無法取得位置天氣');

            currentWeather = await response.json();
            elements.searchCity.value = `${currentWeather.name}, ${currentWeather.sys.country}`;

            const forecastRes = await fetch(
              `${CONFIG.baseUrl}/forecast?lat=${latitude}&lon=${longitude}&units=${CONFIG.units}&appid=${CONFIG.apiKey}`
            );
            if (forecastRes.ok) {
              currentForecast = await forecastRes.json();
            }

            displayWeather();
            showMessage(`✓ 正在使用你的位置：${currentWeather.name}`, 'success');
          } catch (error) {
            showMessage(`❌ ${error.message}`, 'error');
          } finally {
            setLoading(false);
          }
        },
        (error) => {
          showMessage(`❌ 無法獲取位置: ${error.message}`, 'error');
          setLoading(false);
        }
      );
    }

    // 事件監聽器
    elements.saveApiBtn.addEventListener('click', saveApiKey);
    elements.clearApiBtn.addEventListener('click', clearApiKey);
    elements.searchBtn.addEventListener('click', () => searchCity(elements.searchCity.value));
    elements.searchCity.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchCity(elements.searchCity.value);
    });
    elements.geoBtn.addEventListener('click', getGeolocation);
    elements.unitToggle.addEventListener('change', (e) => {
      CONFIG.units = e.target.value;
      if (currentWeather) displayWeather();
    });
    elements.addFavBtn.addEventListener('click', addToFavorites);

    // 初始化
    if (CONFIG.apiKey) {
      elements.apiKey.value = CONFIG.apiKey;
    }
    renderFavorites();

    // 暴露函數到全局
    window.searchCity = searchCity;
  </script>
</body>
</html>
